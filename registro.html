<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Biblioteca — Registro</title>
    <link href="./wwwroot/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./wwwroot/css/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        min-height: 100vh;
        background: #0f0f13;
        font-family: 'DM Sans', sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem 1rem;
      }

      .dk-card {
        background: #18181f;
        border: 1px solid #2a2a35;
        border-radius: 14px;
        padding: 2.5rem 2.2rem 2rem;
        width: 100%;
        max-width: 400px;
      }

      .dk-tag {
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: #6c63ff;
        text-align: center;
        margin-bottom: 10px;
      }

      .dk-title {
        font-family: 'Syne', sans-serif;
        font-size: 26px;
        font-weight: 700;
        color: #f0f0f5;
        text-align: center;
        margin-bottom: 4px;
      }

      .dk-sub {
        font-size: 13px;
        color: #6b6b80;
        text-align: center;
        margin-bottom: 1.8rem;
        font-weight: 300;
      }

      .dk-line {
        height: 1px;
        background: #2a2a35;
        margin-bottom: 1.6rem;
      }

      .dk-label {
        font-size: 11px;
        font-weight: 500;
        color: #8888a0;
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-bottom: 6px;
        display: block;
      }

      .dk-input {
        width: 100%;
        background: #0f0f13;
        border: 1px solid #2a2a35;
        border-radius: 8px;
        padding: 11px 14px;
        font-size: 14px;
        font-family: 'DM Sans', sans-serif;
        color: #f0f0f5;
        margin-bottom: 18px;
        outline: none;
        transition: border-color 0.2s;
      }

      .dk-input:focus { border-color: #6c63ff; }
      .dk-input::placeholder { color: #3a3a50; }

      .dk-btn {
        width: 100%;
        background: #6c63ff;
        color: #fff;
        border: none;
        border-radius: 8px;
        padding: 12px;
        font-size: 12px;
        font-family: 'DM Sans', sans-serif;
        font-weight: 700;
        letter-spacing: 2px;
        text-transform: uppercase;
        cursor: pointer;
        margin-top: 4px;
        transition: background 0.2s;
      }

      .dk-btn:hover { background: #5549e0; }

      .dk-footer {
        text-align: center;
        margin-top: 18px;
        font-size: 13px;
        color: #6b6b80;
      }

      .dk-footer a {
        color: #6c63ff;
        font-weight: 600;
        text-decoration: none;
      }

      .dk-footer a:hover { text-decoration: underline; }
    </style>
  </head>
  <body>

    <div class="dk-card">
      <p class="dk-tag">◆ Biblioteca</p>
      <h1 class="dk-title">Crear cuenta</h1>
      <p class="dk-sub">Únete a la comunidad lectora</p>
      <div class="dk-line"></div>

      <form method="POST" action="usuarios.php">
        <label class="dk-label" for="nombre">Nombre completo</label>
        <input class="dk-input" type="text" id="nombre" name="nombre" placeholder="Tu nombre completo" required>

        <label class="dk-label" for="email">Correo electrónico</label>
        <input class="dk-input" type="email" id="email" name="email" placeholder="tu@correo.com" required>

        <label class="dk-label" for="pwd">Contraseña</label>
        <input class="dk-input" type="password" id="pwd" name="pwd" placeholder="••••••••" required>

        <button class="dk-btn" type="submit">Registrarse</button>
      </form>

      <p class="dk-footer">
        ¿Ya tienes cuenta? <a href="index.html">Inicia sesión</a>
      </p>
    </div>

  </body>
</html>
